<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <rect width="1200" height="400" fill="#0f172a"/>
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Abstract Tech Circles -->
  <circle cx="100" cy="100" r="150" fill="url(#gradient1)" opacity="0.4"/>
  <circle cx="1100" cy="300" r="200" fill="url(#gradient2)" opacity="0.3"/>
  <circle cx="600" cy="200" r="100" fill="url(#gradient3)" opacity="0.2"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Connection Lines -->
  <line x1="200" y1="150" x2="400" y2="150" stroke="rgba(99,102,241,0.2)" stroke-width="2"/>
  <line x1="400" y1="150" x2="500" y2="100" stroke="rgba(99,102,241,0.2)" stroke-width="2"/>
  <line x1="400" y1="150" x2="500" y2="200" stroke="rgba(99,102,241,0.2)" stroke-width="2"/>
  <circle cx="200" cy="150" r="4" fill="#6366f1"/>
  <circle cx="400" cy="150" r="4" fill="#6366f1"/>
  <circle cx="500" cy="100" r="4" fill="#6366f1"/>
  <circle cx="500" cy="200" r="4" fill="#6366f1"/>
  
  <!-- Feature Icons (Abstract) -->
  <g transform="translate(700, 140)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="2"/>
    <path d="M30 15 L30 45 M15 30 L45 30" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(800, 140)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.3)" stroke-width="2"/>
    <circle cx="30" cy="30" r="12" stroke="#0ea5e9" stroke-width="3" fill="none"/>
  </g>
  
  <g transform="translate(900, 140)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="2"/>
    <path d="M18 30 L27 39 L42 21" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Decorative Dots -->
  <circle cx="150" cy="350" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="170" cy="350" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="190" cy="350" r="3" fill="rgba(255,255,255,0.2)"/>
  
  <circle cx="1050" cy="50" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1070" cy="50" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1090" cy="50" r="3" fill="rgba(255,255,255,0.2)"/>
</svg>
